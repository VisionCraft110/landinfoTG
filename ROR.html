<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROR Details - LandInfoTG</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

/* THEME COLORS */
:root{
--forest-green:#0f7a32;
--olive:#0f7a32;
--sand:#ccc;
--soft-white:#f4f7f6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#e3f7ec,#f4f7f6);
}

/* TOPBAR */
.topbar{
display:flex;
align-items:center;
justify-content:space-between;
background:var(--forest-green);
color:white;
padding:8px 12px
}

.side-img img,.right-section img{height:55px}

.logo-area{flex:1;text-align:center}

.logo-area h2{font-size:20px;margin:0}

.logo-area h4{font-size:11px;margin:2px 0}

.tag{font-size:10px;opacity:0.8}

/* MAIN */
.container{
max-width:750px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1)
}

.container h2{
color:black;
font-weight:bold;
margin-bottom:20px;
text-align:center
}

.input-box{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid var(--sand);
border-radius:6px
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:var(--olive);
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px
}

/* RIGHT TOGGLE BUTTON */
#menuToggle{
position:fixed;
top:15px;
right:15px;
font-size:26px;
background:var(--olive);
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
z-index:10000;
}

/* SIDEBAR */
#sidebar{
position:fixed;
top:0;
right:-260px;
width:250px;
height:100%;
background:var(--forest-green);
padding-top:60px;
transition:0.4s;
z-index:9999;
display:flex;
flex-direction:column;
}

#sidebar a{
color:white;
text-decoration:none;
padding:15px 20px;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:15px;
}

#sidebar a:hover{
background:var(--olive);
}

#closeBtn{
position:absolute;
top:15px;
right:15px;
color:white;
font-size:20px;
cursor:pointer;
}

.btn:hover{
background:var(--forest-green);
}

/* RESULT */
.result{
margin-top:25px;
padding:25px;
background:var(--soft-white);
border-radius:15px;
border:2px solid var(--olive);
display:none
}

.ror-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px
}

.ror-box{
background:var(--sand);
padding:12px;
border-radius:10px
}

/* LOGIN OVERLAY */
#loginOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:white;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
}

/* DOWNLOAD POPUP */
#downloadPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
width:350px;
}

.loader{
margin:20px auto;
width:40px;
height:40px;
border:5px solid #eee;
border-top:5px solid var(--forest-green);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

.tick{
font-size:50px;
color:black;
font-weight:bold;
display:none;
margin:15px 0
}

/* INPUTS */
.select-box{
width:100%;
padding:12px;
margin:12px 0;
border-radius:10px;
border:1px solid #ccc;
transition:0.3s;
}

.select-box:focus{
border-color:var(--olive);
box-shadow:0 0 10px rgba(122,132,80,0.3);
outline:none;
}

/* BUTTON */
.search-btn{
width:100%;
padding:14px;
margin-top:15px;
background:var(--olive);
color:white;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.search-btn:hover{
background:var(--forest-green);
}

/* ================= END ================= */
  
</style>
</head>
<!-- RIGHT TOGGLE BUTTON -->
<div id="menuToggle">☰</div>

<!-- RIGHT SIDEBAR -->
<div id="sidebar">
  <div id="closeBtn">✖</div>

  <a href="index.html">Home</a>
  <a href="landsearch.html">Land Search</a>
  <a href="ror.html">ROR</a>
  <a href="ec.html">EC</a>
  <a href="documents.html">Documents</a>
  <a href="prohibited.html">Prohibited</a>
  <a href="about.html">About</a>
</div>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
<div class="login-box">
<h3>User Login</h3>
<input type="text" id="userName" placeholder="Enter Name" class="input-box">
<input type="text" id="userPhone" placeholder="Enter Phone Number" class="input-box">
<input type="email" id="userEmail" placeholder="Enter Email" class="input-box">
<button onclick="loginUser()" class="btn">Continue</button>
</div>
</div>

<nav class="topbar">
<div class="side-img"><img src="images (56).jpg"></div>

<div class="logo-area">
<h2>LandInfoTG</h2>
<h4>ల్యాండ్ ఇన్ఫో తెలంగాణ</h4>
<h4>लैंड इन्फो तेलंगाना</h4>
</div>

</nav>

<div class="container">
<h2>Check ROR Record</h2>

<select id="district" class="select-box"></select>
<select id="mandal" class="select-box"></select>
<select id="village" class="select-box"></select>
<select id="survey" class="select-box" style="display:none;"></select>

<button class="search-btn" onclick="searchROR()">Search ROR</button>
<div class="result" id="resultBox"></div>
</div>

<!-- DOWNLOAD POPUP -->
<div id="downloadPopup">
<div class="popup-box">
<h3 id="popupTitle">Downloading ROR...</h3>
<div class="loader" id="loader"></div>
<div class="tick" id="tick">✔</div>
<p id="popupText">Please wait...</p>
<button onclick="closePopup()" class="btn">Close</button>
</div>
</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdBJIbdHuUWaunbiUuLZP-l8YXpL227XE",
  authDomain: "landinfotg-adee0.firebaseapp.com",
  databaseURL: "https://landinfotg-adee0-default-rtdb.firebaseio.com",
  projectId: "landinfotg-adee0",
  storageBucket: "landinfotg-adee0.firebasestorage.app",
  messagingSenderId: "264939895013",
  appId: "1:264939895013:web:2668833e235c438b4dfc0c"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);


/* ================= GLOBAL DATA ================= */

let allData = [];
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;


/* ================= DOM ELEMENTS ================= */

const district = document.getElementById("district");
const khata = document.getElementById("khata");
const resultBox = document.getElementById("resultBox");

const loginOverlay = document.getElementById("loginOverlay");
const userName = document.getElementById("userName");
const userPhone = document.getElementById("userPhone");
const userEmail = document.getElementById("userEmail");

const downloadPopup = document.getElementById("downloadPopup");
const loader = document.getElementById("loader");
const tick = document.getElementById("tick");
const popupTitle = document.getElementById("popupTitle");
const popupText = document.getElementById("popupText");

const menuToggle = document.getElementById("menuToggle");
const sidebar = document.getElementById("sidebar");
const closeBtn = document.getElementById("closeBtn");


/* ================= LOAD DATA ================= */

window.onload = async function(){

const snapshot = await get(ref(database,"lands"));

if(snapshot.exists()){

const data = snapshot.val();

Object.keys(data).forEach(key=>{
allData.push(data[key]);
});

}

if(currentUser){
loginOverlay.style.display="none";
}

loadDistricts();

};


/* ================= LOGIN ================= */

window.loginUser = function(){

let name = userName.value.trim();
let phone = userPhone.value.trim();
let email = userEmail.value.trim();

if(!name || !phone || !email){
alert("Fill all details");
return;
}

currentUser = {name,phone,email};

localStorage.setItem("currentUser",JSON.stringify(currentUser));

loginOverlay.style.display="none";

};


/* ================= LOAD DISTRICTS ================= */

function loadDistricts(){

    district.innerHTML = `<option value="">Select District</option>`;

    let unique = [...new Set(
        allData.map(i => i.district?.trim())
    )]
    .filter(val => val) // remove empty
    .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));

    unique.forEach(val => {

        let opt = document.createElement("option");
        opt.value = val;
        opt.text = val;
        district.add(opt);

    });

}


/* ================= SEARCH ROR ================= */

window.searchROR=function(){

let dist=district.value;
let kh=khata.value.trim();

if(!dist || !kh){
alert("Fill all fields");
return;
}

let result=allData.find(i=>
String(i.district)===dist &&
String(i.ppb)===kh
);

if(result){

resultBox.innerHTML=`

<h3>Record of Rights (ROR)</h3>

<div class="ror-grid">

<div class="ror-box"><b>District:</b> ${result.district}</div>
<div class="ror-box"><b>Mandal:</b> ${result.mandal}</div>
<div class="ror-box"><b>Village:</b> ${result.village}</div>
<div class="ror-box"><b>Survey:</b> ${result.survey}</div>
<div class="ror-box"><b>Pattadar:</b> ${result.pattadar}</div>
<div class="ror-box"><b>Khata:</b> ${result.ppb}</div>
<div class="ror-box"><b>Extent:</b> ${result.acres} Acres</div>
<div class="ror-box"><b>Status:</b> ${result.landStatus}</div>

</div>

<button class="btn" onclick="downloadROR('${dist}','${result.survey}','${kh}')">
Download ROR
</button>

`;

}else{

resultBox.innerHTML="<h3>No Record Found</h3>";

}

resultBox.style.display="block";

};


/* ================= DOWNLOAD ROR ================= */

window.downloadROR = async function(distVal,surveyVal,khataVal){

if(!currentUser){
loginOverlay.style.display="flex";
return;
}

let userData={
name:currentUser.name,
phone:currentUser.phone,
email:currentUser.email,
type:"ROR",
district:distVal,
survey:surveyVal,
khata:khataVal,
date:new Date().toLocaleString()
};

await set(ref(database,"users/"+Date.now()),userData);

downloadPopup.style.display="flex";

loader.style.display="block";
tick.style.display="none";

popupTitle.innerText="Downloading ROR...";
popupText.innerText="Please wait...";

setTimeout(()=>{

loader.style.display="none";
tick.style.display="block";

popupTitle.innerText="Download Complete";
popupText.innerText="ROR update soon.";

localStorage.removeItem("currentUser");
currentUser=null;

setTimeout(()=>{
downloadPopup.style.display="none";
},1500);

},2000);

};


/* ================= SIDEBAR ================= */

menuToggle.onclick=()=>{
sidebar.style.right="0";
};

closeBtn.onclick=()=>{
sidebar.style.right="-260px";
};

</script>
</body>
</html>
