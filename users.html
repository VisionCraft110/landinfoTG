<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Service Users | LandInfoTG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#e3f7ec,#f4f7f6);
margin:0;
color:#333;
}

header{
background:#0f7a32;
color:white;
text-align:center;
padding:18px;
font-size:24px;
font-weight:600;
}

.container{
max-width:1000px;
margin:30px auto;
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.search-box{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

/* FILTER BUTTONS */
.filter-buttons{
margin-bottom:20px;
}

.filter-buttons button{
padding:8px 15px;
margin-right:8px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:13px;
color:white;
}

.all-btn{background:#6c757d;}
.ec-btn{background:#17a2b8;}
.ror-btn{background:#6f42c1;}
.doc-btn{background:#fd7e14;}

.card{
background:#f9fbff;
border:1px solid #d9e6f2;
border-radius:10px;
padding:15px 20px;
margin-bottom:15px;
position:relative;
}

.service-badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;
margin-left:8px;
}

.ec-badge{background:#17a2b8;}
.ror-badge{background:#6f42c1;}
.doc-badge{background:#fd7e14;}

.delete-btn{
background:#ff4d4d;
color:white;
border:none;
border-radius:8px;
padding:6px 12px;
cursor:pointer;
position:absolute;
right:15px;
bottom:15px;
}

.whatsapp-btn{
display:inline-block;
background:#25D366;
color:white;
padding:6px 12px;
border-radius:8px;
font-size:12px;
text-decoration:none;
position:absolute;
right:15px;
top:15px;
}

footer{
text-align:center;
background:#7A8450;
color:white;
padding:10px;
margin-top:40px;
}
</style>
</head>
<body>

<header>📋 Service Users — LandInfoTG</header>

<div class="container">

<input type="text" id="searchBar" class="search-box"
placeholder="Search by name, phone, district...">

<div class="filter-buttons">
<button class="all-btn" onclick="filterService('All')">All</button>
<button class="ec-btn" onclick="filterService('EC')">EC</button>
<button class="ror-btn" onclick="filterService('ROR')">ROR</button>
<button class="doc-btn" onclick="filterService('Documents')">Documents</button>
</div>

<div id="list">Loading...</div>

</div>

<footer>© 2026 LandInfoTG</footer>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "landinfotg-adee0.firebaseapp.com",
  databaseURL: "https://landinfotg-adee0-default-rtdb.firebaseio.com",
  projectId: "landinfotg-adee0",
  storageBucket: "landinfotg-adee0.firebasestorage.app",
  messagingSenderId: "264939895013",
  appId: "1:264939895013:web:2668833e235c438b4dfc0c"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);


/* ================= GLOBAL ================= */

let allUsers = [];
let currentFilter = "All";

const listDiv = document.getElementById("list");
const searchBar = document.getElementById("searchBar");


/* ================= LOAD USERS FROM FIREBASE ================= */

function loadUsers(){

onValue(ref(database,"users"), (snapshot)=>{

allUsers = [];

if(snapshot.exists()){

const data = snapshot.val();

Object.keys(data).forEach(key=>{
allUsers.push({
id:key,
...data[key]
});
});

}

applyFilters();

});

}


/* ================= FILTER BUTTON ================= */

window.filterService = function(type){
currentFilter = type;
applyFilters();
};


/* ================= SEARCH ================= */

searchBar.addEventListener("input", applyFilters);


/* ================= APPLY FILTERS ================= */

function applyFilters(){

let text = searchBar.value.toLowerCase();

let filtered = allUsers.filter(u=>{

let serviceValue = (u.service || u.type || "EC").toLowerCase();
let filterValue = currentFilter.toLowerCase();

let matchSearch =
(u.name && u.name.toLowerCase().includes(text)) ||
(u.phone && u.phone.includes(text)) ||
(u.district && u.district.toLowerCase().includes(text));

let matchService =
filterValue === "all" ||
serviceValue === filterValue;

return matchSearch && matchService;

});

renderList(filtered);

}


/* ================= RENDER USERS ================= */

function renderList(users){

listDiv.innerHTML = "";

if(users.length === 0){
listDiv.innerHTML = "<p>No Users Found</p>";
return;
}

users.slice().reverse().forEach((data)=>{

let serviceValue = (data.service || data.type || "EC").toLowerCase();
let displayService = (data.service || data.type || "EC");

let badgeClass = "ec-badge";
if(serviceValue === "ror") badgeClass = "ror-badge";
if(serviceValue === "documents") badgeClass = "doc-badge";

let serviceBadge = `
<span class="service-badge ${badgeClass}">
${displayService}
</span>`;

listDiv.innerHTML += `
<div class="card">

<h3>
${data.name || '-'} (${data.phone || '-'})
${serviceBadge}
</h3>

<p><b>District:</b> ${data.district || '-'}</p>
<p><b>Survey:</b> ${data.survey || '-'}</p>
<p><b>Khata:</b> ${data.khata || '-'}</p>
<p><b>Date:</b> ${data.date || '-'}</p>

<a href="https://wa.me/91${data.phone}?text=Hello%20${data.name},%20your%20${displayService}%20request%20is%20received."
class="whatsapp-btn" target="_blank">
WhatsApp
</a>

<button class="delete-btn"
onclick="deleteUser('${data.id}')">
Delete
</button>

</div>
`;

});

}


/* ================= DELETE ================= */

window.deleteUser = function(id){

if(confirm("Delete this record?")){

remove(ref(database,"users/"+id));

}

};


/* ================= START ================= */

loadUsers();

</script>

</body>
</html>
