<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - LandInfoTG</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#e3f7ec,#f4f7f6);min-height:100vh;}

nav{
background:#0f7a32;color:white;padding:18px 40px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
position:relative;
}

nav h2{font-weight:700;}

a{color:white;text-decoration:none;}

/* BACK BUTTON */
.back-arrow{
position:absolute;
left:15px;
font-size:22px;
cursor:pointer;
font-weight:600;
}

.back-arrow:hover{
opacity:0.8;
}

.container{
max-width:1200px;margin:40px auto;background:white;
padding:40px;border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;margin-bottom:20px;
}

input,select{
padding:10px;border-radius:10px;border:1px solid #ccc;
font-size:14px;transition:0.3s;
}

input:focus,select:focus{
border-color:#0f7a32;
box-shadow:0 0 8px rgba(15,122,50,0.3);
outline:none;
}

.save-btn{
margin-top:10px;width:100%;padding:14px;
background:#0f7a32;color:white;border:none;
border-radius:12px;font-size:15px;cursor:pointer;
}

.table-card{
margin-top:40px;background:white;padding:25px;
border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.table-wrapper{
overflow-x:auto;max-height:400px;overflow-y:auto;
}

table{
width:100%;border-collapse:collapse;min-width:900px;
}

thead{
position:sticky;top:0;background:#0f7a32;color:white;
}

th,td{padding:12px;font-size:14px;border-bottom:1px solid #eee;}
tbody tr:hover{background:#f3fff8;}

.delete-btn{
background:#ff4d4d;color:white;border:none;
padding:6px 12px;border-radius:8px;cursor:pointer;
}

img.preview{
max-width:120px;border-radius:8px;margin-top:10px;
display:none;
}
</style>
</head>

<body>

<nav>
<span class="back-arrow" onclick="goBack()">←</span>
<h2>Admin Dashboard</h2>
<a href="users.html">users</a>
</nav>

<div class="container">

<h3 style="margin-bottom:20px;color:black;font-weight:bold;">Add Land Record</h3>

<div class="form-grid">

<input placeholder="District" id="district">
<input placeholder="Mandal" id="mandal">
<input placeholder="Village" id="village">
<input placeholder="Survey No" id="survey">
<input placeholder="Pattadar Name" id="pattadar">
<input placeholder="Father / Husband Name" id="father">
<input placeholder="PPB Number / Katha Number" id="ppb">

<select id="kyc">
<option value="">KYC Status</option>
<option>Verified</option>
<option>Pending</option>
<option>Rejected</option>
</select>

<input placeholder="Total Acres" id="acres">
<input placeholder="Land Status (Clear / Dispute)" id="landStatus">
<input placeholder="Nature of Land" id="nature">
<input placeholder="Classification of Land" id="qualification">

<select id="landType">
<option value="">Land Type</option>
<option>Agriculture</option>
<option>Residential</option>
<option>Commercial</option>
</select>

<input placeholder="Market Value" id="marketValue">

<input type="file" id="surveyImage" accept="image/*">
<img id="surveyPreview" class="preview">

<input type="file" id="documentImage" accept="image/*">
<img id="documentPreview" class="preview">

<input placeholder="Document ID" id="documentId">

</div>

<button class="save-btn" id="saveRecordBtn">Save Record</button>

<div style="margin-top:15px;padding:10px;background:#f0f0f0;border-radius:8px;border:1px solid #ccc;">
<button style="padding:10px 15px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;" onclick="testLoadData()">🔍 Test: Load Data </button>
<div id="debugOutput" style="margin-top:10px;padding:15px;background:white;border-radius:6px;border:2px solid #007bff;font-family:monospace;font-size:13px;min-height:100px;max-height:250px;overflow-y:auto;display:none;white-space:pre;line-height:1.5;color:#333;"></div>
</div>

<div class="table-card">
<h3 style="margin-bottom:20px;color:black;font-weight:bold;">Saved Records</h3>

<div style="margin-bottom:15px;">
<input type="text" id="searchInput"
placeholder="Search by District, Village, Owner, Survey, PPB..."
style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;"
onkeyup="filterTable()">
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>District</th>
<th>Mandal</th>
<th>Village</th>
<th>Survey</th>
<th>Owner</th>
<th>Acres</th>
<th>Value</th>
<th>Survey Image</th>
<th>Document Image</th>
<th>Document ID</th>
<th>Action</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>
</div>
</div>

<div style="margin-top:40px;">
<h3 style="margin-bottom:15px;color:black;font-weight:bold;">Update Hero Notification</h3>

<textarea id="adminNotice"
placeholder="Enter notification message..."
style="width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;min-height:100px;"></textarea>

<button onclick="saveNotice()"
style="margin-top:10px;padding:10px 18px;background:#0f7a32;color:white;border:none;border-radius:8px;cursor:pointer;">
Save Notification
</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "landinfotg-adee0.firebaseapp.com",
  databaseURL: "https://landinfotg-adee0-default-rtdb.firebaseio.com",
  projectId: "landinfotg-adee0",
  storageBucket: "landinfotg-adee0.firebasestorage.app",
  messagingSenderId: "264939895013",
  appId: "1:264939895013:web:2668833e235c438b4dfc0c"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const storage = getStorage(app);
/* ================= DATABASE FUNCTIONS ================= */

window.saveToDatabase = async function(path, data) {
  await set(ref(database, path), data);
};

window.readFromDatabase = async function(path) {
  const snapshot = await get(ref(database, path));
  return snapshot.exists() ? snapshot.val() : null;
};

window.deleteFromDatabase = async function(path) {
  await remove(ref(database, path));
};
// Survey Preview
document.getElementById("surveyImage").addEventListener("change", function(e){

let file = e.target.files[0];
if(!file) return;

let reader = new FileReader();
reader.onload = function(event){
document.getElementById("surveyPreview").src = event.target.result;
document.getElementById("surveyPreview").style.display = "block";
};
reader.readAsDataURL(file);

});

// Document Preview
document.getElementById("documentImage").addEventListener("change", function(e){

let file = e.target.files[0];
if(!file) return;

let reader = new FileReader();
reader.onload = function(event){
document.getElementById("documentPreview").src = event.target.result;
document.getElementById("documentPreview").style.display = "block";
};
reader.readAsDataURL(file);

});
async function saveLand(){

let surveyFile = document.getElementById("surveyImage")?.files[0];
let documentFile = document.getElementById("documentImage")?.files[0];

let surveyURL = "";
let documentURL = "";

/* Upload Survey Image */
if(surveyFile){

const surveyRef = storageRef(storage, "surveyImages/" + Date.now() + "_" + surveyFile.name);

await uploadBytes(surveyRef, surveyFile);

surveyURL = await getDownloadURL(surveyRef);

}

/* Upload Document Image */
if(documentFile){

const documentRef = storageRef(storage, "documentImages/" + Date.now() + "_" + documentFile.name);

await uploadBytes(documentRef, documentFile);

documentURL = await getDownloadURL(documentRef);

}

let land={
district: document.getElementById("district")?.value.trim() || "",
mandal: document.getElementById("mandal")?.value.trim() || "",
village: document.getElementById("village")?.value.trim() || "",
survey: document.getElementById("survey")?.value.trim() || "",

pattadar: document.getElementById("pattadar")?.value.trim() || "",
father: document.getElementById("father")?.value.trim() || "",
ppb: document.getElementById("ppb")?.value.trim() || "",
kyc: document.getElementById("kyc")?.value || "",
acres: document.getElementById("acres")?.value.trim() || "",
landStatus: document.getElementById("landStatus")?.value.trim() || "",
nature: document.getElementById("nature")?.value.trim() || "",
qualification: document.getElementById("qualification")?.value.trim() || "",
marketValue: document.getElementById("marketValue")?.value.trim() || "",
surveyImage: surveyURL,
documentImage: documentURL,
documentId: document.getElementById("documentId")?.value.trim() || ""
};

if(!land.district || !land.mandal || !land.village || !land.survey){
alert("Fill required fields");
return;
}

const key = Date.now();

await window.saveToDatabase("lands/"+key, land);

alert("Record Saved with Images ✅");

clearForm();
await loadData();

}
/* ================= LOAD DATA ================= */

async function loadData(){

const landsData = await window.readFromDatabase("lands");

let lands=[];

if(landsData){
Object.keys(landsData).forEach(key=>{
lands.push({
firebaseKey:key,
...landsData[key]
});
});
}

const table=document.getElementById("dataTable");
table.innerHTML="";

if(lands.length===0){
table.innerHTML="<tr><td colspan='8'>No Records Found</td></tr>";
return;
}

lands.forEach(l=>{
table.innerHTML+=`
<tr>
<td>${l.district||'-'}</td>
<td>${l.mandal||'-'}</td>
<td>${l.village||'-'}</td>
<td>${l.survey||'-'}</td>
<td>${l.pattadar||'-'}</td>
<td>${l.acres||'-'}</td>
<td>${l.marketValue||'-'}</td>
<td>
${l.surveyImage ? `<img src="${l.surveyImage}" width="60">` : '-'}
</td>

<td>
${l.documentImage ? `<img src="${l.documentImage}" width="60">` : '-'}
</td>
<td>${l.documentId||'-'}</td>
<td>
<button class="delete-btn"
 onclick="deleteLand('${l.firebaseKey}')">
Delete
</button>
</td>
</tr>
`;
});

}

/* ================= DELETE LAND ================= */

window.deleteLand = async function(firebaseKey){

if(!confirm("Delete this record?")) return;

try{
await window.deleteFromDatabase("lands/"+firebaseKey);
alert("Deleted Successfully ✅");
await loadData();
}catch(error){
alert("Error deleting record");
console.error(error);
}

};

/* ================= NOTIFICATION SAVE ================= */

window.saveNotice = async function(){

let notice = document.getElementById("adminNotice")?.value.trim();

if(!notice){
alert("Enter notification text");
return;
}

await window.saveToDatabase("notification/current",{
text: notice,
date: new Date().toLocaleString()
});

alert("Notification Updated ✅");

};

/* ================= LOAD CURRENT NOTICE (ADMIN SIDE) ================= */

onValue(ref(database,"notification/current"),(snapshot)=>{

if(snapshot.exists()){
let data = snapshot.val();
let noticeInput = document.getElementById("adminNotice");
if(noticeInput){
noticeInput.value = data.text;
}
}

});

/* ================= CLEAR FORM ================= */

function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll("select").forEach(s=>s.value="");
}

/* ================= INIT ================= */

window.addEventListener("load", function(){
loadData();

const saveBtn=document.getElementById("saveRecordBtn");
if(saveBtn){
saveBtn.addEventListener("click", saveLand);
}
});
document.getElementById("searchInput")
.addEventListener("input", function(){

let value = this.value.toLowerCase();
let rows = document.querySelectorAll("#dataTable tr");

rows.forEach(row=>{
let text = row.innerText.toLowerCase();
row.style.display = text.includes(value) ? "" : "none";
});

});
</script>

</body>
</html>
